name: ニュース自動更新

on:
  schedule:
    # 6時間ごと（JST 1:15 / 7:15 / 13:15 / 19:15）
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: ニュースを取得
        run: node scrape-news.js
      - name: 変更があればコミット
        run: |
          git config user.name "bcal-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase
          git add news.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "ニュース更新"
            git push
          fi
